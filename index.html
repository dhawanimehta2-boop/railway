
{% extends "base.html" %}
{% block content %}
<img src="/static/images/train-banner.jpg" class="banner">

<div class="search-box">
    <h2>Book Your Ticket</h2>
    <form action="/search" method="POST">
        <div class="form-group">
            <label>From Station</label>
            <input type="text" name="from" placeholder="e.g. Kolkata" required>
        </div>
        <div class="form-group">
            <label>To Station</label>
            <input type="text" name="to" placeholder="e.g. Delhi" required>
        </div>
        <div class="form-row-double">
            <div class="form-group">
                <label>Journey Date</label>
                <input type="date" name="date" required>
            </div>
            <div class="form-group">
                <label>Class</label>
                <select name="class">
                    <option value="2AC">2AC</option>
                    <option value="3AC">3AC</option>
                    <option value="SL">Sleeper</option>
                </select>
            </div>
        </div>
        <button type="submit" class="btn-book">Search Trains</button>
    </form>
</div>
{% endblock %}
